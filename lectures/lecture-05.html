#General Transit Feed Specification (GTFS)

GTFS contains timetable, stop and path data for PT services in Victoria (and is a global standard)
&lt;br&gt;&lt;br&gt;
It's the data which Google Maps ingests to show you PT in Google Maps&lt;br&gt;

I go through using GTFS shape and stop data in R in an RLadies talk I did in 2018:&lt;br&gt;
[Slides - Public Transport Maps &amp; Geospatial Data in R](https://drive.google.com/file/d/191Jq1awInmtXPXrVlywXXaQjxv0basHe)&lt;br&gt;


&lt;br&gt;There are packages like [tidytransit](http://tidytransit.r-transit.org/index.html) which can help you navigate the GTFS Format (it's a bit [complicated](https://xang1234.github.io/images/isochrone/gtfs.png))

For example you could look into service frequencies &amp; headways for each public transport route -&lt;br&gt;
http://tidytransit.r-transit.org/articles/frequency.html

#Punctuality and Reliability

Official Definition
.blockquote[

&lt;h2&gt;What do we monitor?&lt;/h2&gt;&lt;p&gt;Every operator needs to meet the performance thresholds in their contact. The thresholds are:&lt;/p&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Punctuality&lt;/strong&gt; - the percentage of on-time events at specific points.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Reliability&lt;/strong&gt; - the proportion of timetabled services the operator delivers.&lt;/li&gt;
&lt;/ul&gt;.cite[PTV Website &amp;nbsp; https://www.ptv.vic.gov.au/footer/data-and-reporting/network-performance/]]

####Some of the many reasons public transport services are more late or cancelled than usual:

Temporary Speed Restrictions (Track Condition),&amp;nbsp;&amp;nbsp;
Signal Faults,&amp;nbsp;&amp;nbsp;
Track Faults,&amp;nbsp;&amp;nbsp;
Trees Falling on Track/Overhead,&amp;nbsp;&amp;nbsp;
Overhead Faults,&amp;nbsp;&amp;nbsp; 
Vehicle Faults,&amp;nbsp;&amp;nbsp; 
Power Faults,&amp;nbsp;&amp;nbsp; 
Signals Passed at Danger,&amp;nbsp;&amp;nbsp; 
Grass Fires,&amp;nbsp;&amp;nbsp;

Protests,&amp;nbsp;&amp;nbsp; 
Cars Blocking Track,&amp;nbsp;&amp;nbsp; 
Derailments,&amp;nbsp;&amp;nbsp; 
Collisions,&amp;nbsp;&amp;nbsp; 
Evacuation of Train Control,&amp;nbsp;&amp;nbsp; 
Rats Eating Signalling Cables,&amp;nbsp;&amp;nbsp;

#Summarising the data by year - group_by() and summarise()


```r
library(dplyr)
library(magrittr)
performance %&gt;% 
  #dplyr::filter(Service_Year&gt;2015) %&gt;% 
  group_by(Service_Year, Mode) %&gt;% 
summarise(num_services_scheduled=sum(num_services_scheduled)) %&gt;% 
  ungroup -&gt; perf_year

head(perf_year)
```

#Punctuality and Reliability calculations in R
(don't worry about this detail, I've written the function for you)
.f5[

```r
perf_calc&lt;- perf_month %&gt;% mutate(
  Reliability=case_when(
  Mode =="Metro" ~ ((1-((num_services_cancelled+(0.25*num_services_short)+(0.125*num_services_bypassed))
                      /num_services_scheduled))*100),
  Mode == "Yarra" ~ (1-((num_services_cancelled+ 0.125*num_services_short)
                        /num_services_scheduled))*100,
  Mode == "VLine" ~  (1-(num_services_cancelled/num_services_scheduled))*100),

  Punctuality=case_when(
  Mode =="Metro" ~ (num_services_on_time_at_dest/num_services_scheduled_at_dest)*100,
  Mode == "Yarra" ~ (num_observations_on_time / num_observations_scheduled)*100,
  Mode == "VLine" ~  (num_services_on_time_at_dest/num_services_scheduled_at_dest)*100
  )
)
```
